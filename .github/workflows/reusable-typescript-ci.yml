name: Reusable TypeScript CI

# Reusable workflow for MCPmed TypeScript MCP servers (breadcrumbsMCP, PBMCpediaMCP).
# Supports npm or pnpm via the `package-manager` input.
#
# Example caller (.github/workflows/ci.yml in a downstream repo):
#
#   name: CI
#   on:
#     push: { branches: [main] }
#     pull_request:
#   jobs:
#     ci:
#       uses: MCPmed/.github/.github/workflows/reusable-typescript-ci.yml@main
#       with:
#         package-manager: pnpm
#         node-versions: "['20','22']"

on:
  workflow_call:
    inputs:
      package-manager:
        description: "'npm' or 'pnpm'."
        type: string
        required: false
        default: "npm"
      node-versions:
        description: "JSON array of Node.js versions."
        type: string
        required: false
        default: "['20','22']"
      run-typecheck:
        description: "Run 'tsc --noEmit'."
        type: boolean
        required: false
        default: true
      run-lint:
        description: "Run the 'lint' npm script if it exists."
        type: boolean
        required: false
        default: true
      run-tests:
        description: "Run the 'test' npm script if it exists."
        type: boolean
        required: false
        default: true
      run-build:
        description: "Run the 'build' npm script if it exists."
        type: boolean
        required: false
        default: true
      working-directory:
        description: "Subdirectory to run from."
        type: string
        required: false
        default: "."

jobs:
  ci:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(inputs.node-versions) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        if: ${{ inputs.package-manager == 'pnpm' }}
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: |
            ${{ inputs.working-directory }}/package-lock.json
            ${{ inputs.working-directory }}/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Type check
        if: ${{ inputs.run-typecheck }}
        run: npx tsc --noEmit

      - name: Lint
        if: ${{ inputs.run-lint }}
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            ${{ inputs.package-manager }} run lint
          else
            echo "No 'lint' script defined — skipping."
          fi

      - name: Test
        if: ${{ inputs.run-tests }}
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            ${{ inputs.package-manager }} run test
          else
            echo "No 'test' script defined — skipping."
          fi

      - name: Build
        if: ${{ inputs.run-build }}
        run: |
          if node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then
            ${{ inputs.package-manager }} run build
          else
            echo "No 'build' script defined — skipping."
          fi
